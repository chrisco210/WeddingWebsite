<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP</title>
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/savethedate.css" />
    <link rel="stylesheet" href="style/rsvp_form.css" />
  </head>
  <body>
    <div class="card">
      <div id="inside-line">
        <h2>Please enter the password on your invite</h2>
        <p>It should be on your invite — email me if you can’t find it.</p>
        <div class="input-form">
          <input
            type="password"
            id="password"
            class="button-link"
            onkeydown="if (event.key === 'Enter') unlock();"
          />
          <label>
            <input type="checkbox" id="remember" checked />
            Remember password
          </label>
          <button onclick="unlock()" class="button-link transition-button-link">
            Unlock
          </button>
          <p id="output"></p>
        </div>
      </div>
    </div>
    <script src="rsvp_form.js"></script>
    <script src="rsvp.js"></script>
  </body>
</html>
