<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP</title>
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/savethedate.css" />
    <link rel="stylesheet" href="style/rsvp_form.css" />
  </head>
  <body class="rsvp-form-body">
    <div class="card rsvp-card">
      <div id="inside-line">
        <h2>RSVP</h2>

        <!-- Search view -->
        <div id="view-search">
          <p>Type your name to find your invitation.</p>
          <div class="input-form">
            <input
              type="text"
              id="name-search"
              class="button-link"
              placeholder="Your name"
              autocomplete="off"
            />
            <p>Select the party you wish to RSVP for</p>
            <ul id="search-results"></ul>
          </div>
        </div>

        <!-- Party form view -->
        <div id="view-party" style="display: none">
          <div id="party-name"></div>
          <form id="rsvp-form">
            <div id="guest-list"></div>
            <p id="rsvp-status" aria-live="polite"></p>
            <div class="rsvp-actions">
              <button
                type="submit"
                id="submit-btn"
                class="button-link transition-button-link"
              >
                Submit RSVP
              </button>
              <button
                type="button"
                id="back-btn"
                class="button-link transition-button-link"
              >
                ← Search again
              </button>
            </div>
          </form>
        </div>

        <!-- Confirmation view -->
        <div id="view-confirmation" style="display: none">
          <div class="confirmation-content">
            <h3>Thank you!</h3>
            <p>We can't wait to celebrate with you!</p>
            <div id="confirmation-summary"></div>
            <button
              type="button"
              id="update-rsvp-btn"
              class="button-link transition-button-link"
            >
              Update RSVP
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/rsvp_app.js"></script>
  </body>
</html>
