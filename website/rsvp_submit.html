<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP</title>
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/savethedate.css" />
    <link rel="stylesheet" href="style/rsvp_form.css" />
  </head>
  <body class="rsvp-form-body">
    <div class="card rsvp-card">
      <div id="inside-line">
        <div id="rsvp-party">
          <div id="party-name"></div>
          <form id="rsvp-form">
            <div id="guest-list"></div>
            <p id="rsvp-status" aria-live="polite"></p>
            <div class="rsvp-actions">
              <button type="submit" class="button-link transition-button-link">
                Submit RSVP
              </button>
              <button
                type="button"
                id="back-btn"
                class="button-link transition-button-link"
              >
                ← Search again
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="rsvp_submit.js"></script>
  </body>
</html>
